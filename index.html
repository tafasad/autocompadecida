<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teatro Teleprompter - Auto da Compadecida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        input[type="range"] { -webkit-appearance: none; background: #1e293b; border-radius: 999px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="app" class="flex h-screen"></div>

    <script>
        // --- CONFIGURAÇÕES E BANCO DE DADOS ---
        const DB_NAME = "teleprompter_db";
        const STORE_NAME = "script";
        
        const defaultLines = [
            { id: 1, text: "No sertão nordestino, onde o sol castiga, a fome aperta e a esperteza vale mais que dinheiro… nasceram João Grilo e Chicó…", effect: "Introdução", media: null, mediaType: null, mediaName: "Voz do PC" },
            { id: 2, text: "E ande logo antes que mudem de ideia!", effect: "Risada", media: null, mediaType: null, mediaName: "Risada automática" }
        ];

        let state = {
            lines: [],
            threshold: 10,
            selectedId: 1,
            isListening: false,
            transcript: "",
            status: "Iniciando...",
            activeMediaUrl: null
        };

        const dbRequest = indexedDB.open(DB_NAME, 1);
        dbRequest.onupgradeneeded = (e) => {
            e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        };

        dbRequest.onsuccess = (e) => {
            const db = e.target.result;
            loadData(db);
        };

        function loadData(db) {
            const tx = db.transaction(STORE_NAME, "readonly");
            const store = tx.objectStore(STORE_NAME);
            const req = store.getAll();
            req.onsuccess = () => {
                if (req.result.length > 0) {
                    state.lines = req.result;
                } else {
                    state.lines = defaultLines;
                    saveAll();
                }
                state.selectedId = state.lines[0].id;
                render();
            };
        }

        function saveAll() {
            const dbReq = indexedDB.open(DB_NAME, 1);
            dbReq.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                store.clear();
                state.lines.forEach(l => store.add(l));
            };
        }

        // --- LÓGICA DE RECONHECIMENTO E ÁUDIO ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (Recognition) {
            recognition = new Recognition();
            recognition.lang = "pt-BR";
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                let final = ""; let interim = "";
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                state.transcript = (final || interim).trim();
                checkMatch(state.transcript);
                render();
            };

            recognition.onend = () => {
                if (state.isListening) recognition.start();
            };
        }

        function checkMatch(text) {
            const normalized = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
            const spoken = normalized(text);
            
            state.lines.forEach(line => {
                const target = normalized(line.text);
                if (!target) return;
                
                // Similaridade simples: se o que foi falado contém parte da frase ou vice-versa
                let score = 0;
                if (spoken.includes(target) || target.includes(spoken)) score = 100;
                
                if (score >= state.threshold) {
                    playMedia(line);
                }
            });
        }

        let cooldown = false;
        function playMedia(line) {
            if (cooldown) return;
            cooldown = true;
            setTimeout(() => cooldown = false, 3000);

            if (line.media) {
                const url = URL.createObjectURL(line.media);
                if (line.mediaType === "video") {
                    state.activeMediaUrl = url;
                    render();
                    setTimeout(() => {
                        const v = document.getElementById('player-video');
                        v.play();
                        v.onended = () => { state.activeMediaUrl = null; URL.revokeObjectURL(url); render(); };
                    }, 100);
                } else {
                    const a = new Audio(url);
                    a.play();
                    a.onended = () => URL.revokeObjectURL(url);
                }
            } else {
                // Efeito sintético se não tiver arquivo
                if (line.text.includes("mudem de ideia") || line.effect.toLowerCase().includes("risada")) {
                    playLaugh();
                }
            }
        }

        function playLaugh() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const g = ctx.createGain(); g.gain.value = 0.1; g.connect(ctx.destination);
            [0, 0.2, 0.4].forEach(o => {
                const osc = ctx.createOscillator();
                osc.frequency.setValueAtTime(400, ctx.currentTime + o);
                osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + o + 0.1);
                osc.connect(g); osc.start(ctx.currentTime + o); osc.stop(ctx.currentTime + o + 0.15);
            });
        }

        // --- INTERFACE (UI) ---
        function render() {
            const root = document.getElementById('app');
            const selected = state.lines.find(l => l.id === state.selectedId) || state.lines[0];

            root.innerHTML = `
                ${state.activeMediaUrl ? `
                    <div class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
                        <video id="player-video" src="${state.activeMediaUrl}" class="max-w-full max-h-full"></video>
                        <button onclick="state.activeMediaUrl=null;render()" class="absolute top-8 right-8 text-white text-5xl font-bold">✕</button>
                    </div>
                ` : ''}

                <aside class="w-80 border-r border-slate-800 bg-slate-900/50 flex flex-col shadow-2xl">
                    <div class="p-6 border-b border-slate-800">
                        <h1 class="text-xl font-black tracking-tight">Teleprompter</h1>
                        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">Auto da Compadecida</p>
                    </div>
                    
                    <div class="p-4 border-b border-slate-800 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase">Microfone</span>
                            <button onclick="toggleMic()" class="px-4 py-1.5 rounded-full text-xs font-black transition-all ${state.isListening ? 'bg-red-500 shadow-lg shadow-red-900/40 animate-pulse' : 'bg-emerald-600 hover:bg-emerald-500'}">
                                ${state.isListening ? 'DESLIGAR' : 'LIGAR'}
                            </button>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between text-[10px] font-bold text-slate-500">
                                <span>SENSIBILIDADE</span>
                                <span>${state.threshold}%</span>
                            </div>
                            <input type="range" min="5" max="95" value="${state.threshold}" oninput="state.threshold=this.value;render()" onchange="saveAll()" class="w-full h-1">
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto p-2 space-y-1 scrollbar-hide">
                        ${state.lines.map(l => `
                            <button onclick="selectLine(${l.id})" class="w-full text-left p-4 rounded-xl border transition-all ${l.id === state.selectedId ? 'bg-blue-600/20 border-blue-500 shadow-lg' : 'border-transparent hover:bg-slate-800/50'}">
                                <div class="flex justify-between text-[9px] font-black text-blue-400 uppercase mb-1">
                                    <span>FALA</span>
                                    <span>${l.mediaType || 'vazio'}</span>
                                </div>
                                <p class="text-xs font-medium line-clamp-2">${l.text || 'Sem texto...'}</p>
                            </button>
                        `).join('')}
                        <button onclick="addLine()" class="w-full p-3 border border-dashed border-slate-700 rounded-xl text-xs text-slate-500 font-bold hover:border-slate-500 transition-all mt-2">+ NOVA FALA</button>
                    </div>
                </aside>

                <main class="flex-1 p-12 overflow-y-auto bg-[radial-gradient(circle_at_50%_50%,rgba(30,41,59,0.5),transparent)]">
                    <div class="max-w-3xl mx-auto space-y-8">
                        <div class="space-y-3">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Texto para Chicó/João Grilo falar</label>
                            <textarea oninput="updateText(this.value)" class="w-full h-48 bg-slate-900 border border-slate-800 rounded-2xl p-6 text-2xl font-bold text-white focus:outline-none focus:border-blue-500 transition-all shadow-inner" placeholder="Ex: E ande logo antes que mudem de ideia!">${selected.text}</textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Nome do Efeito</label>
                                <input type="text" value="${selected.effect}" oninput="updateEffect(this.value)" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-sm font-bold text-white focus:outline-none focus:border-blue-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Mídia (Vídeo ou Áudio)</label>
                                <input type="file" id="file-up" accept="video/*,audio/*" onchange="handleFile(this.files[0])" class="hidden">
                                <label htmlFor="file-up" onclick="document.getElementById('file-up').click()" class="flex items-center justify-center w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-xs font-black cursor-pointer hover:bg-slate-700 transition-all">
                                    ${selected.mediaName || 'SUBIR ARQUIVO'}
                                </label>
                            </div>
                        </div>

                        <div class="flex gap-4 pt-4">
                            <button onclick="playMedia(state.lines.find(l=>l.id===state.selectedId))" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl text-sm font-black shadow-lg shadow-blue-900/40 transition-all active:scale-95">TESTAR AGORA</button>
                            <button onclick="deleteLine()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-8 py-3 rounded-xl text-sm font-black border border-red-500/20 transition-all">APAGAR</button>
                        </div>

                        <div class="bg-slate-900/80 backdrop-blur-md border border-slate-800 p-6 rounded-2xl space-y-3 shadow-xl">
                            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Monitor de Voz</h3>
                            <p class="text-xl font-medium text-slate-300 italic">“${state.transcript || 'Silêncio no set...'}”</p>
                            <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">${state.isListening ? '● Gravando e Analisando' : '○ Microfone Desligado'}</p>
                        </div>
                    </div>
                </main>
            `;
        }

        // --- FUNÇÕES DE INTERAÇÃO ---
        function toggleMic() {
            if (!recognition) return alert("Navegador não suporta voz!");
            state.isListening = !state.isListening;
            if (state.isListening) recognition.start();
            else recognition.stop();
            render();
        }

        function selectLine(id) {
            state.selectedId = id;
            render();
        }

        function addLine() {
            const newLine = { id: Date.now(), text: "", effect: "Novo efeito", media: null, mediaType: null, mediaName: "Vazio" };
            state.lines.push(newLine);
            state.selectedId = newLine.id;
            saveAll();
            render();
        }

        function deleteLine() {
            if (state.lines.length <= 1) return;
            state.lines = state.lines.filter(l => l.id !== state.selectedId);
            state.selectedId = state.lines[0].id;
            saveAll();
            render();
        }

        function updateText(val) {
            const line = state.lines.find(l => l.id === state.selectedId);
            if (line) { line.text = val; saveAll(); }
        }

        function updateEffect(val) {
            const line = state.lines.find(l => l.id === state.selectedId);
            if (line) { line.effect = val; saveAll(); render(); }
        }

        function handleFile(file) {
            if (!file) return;
            const line = state.lines.find(l => l.id === state.selectedId);
            if (line) {
                line.media = file;
                line.mediaName = file.name;
                line.mediaType = file.type.startsWith("video") ? "video" : "audio";
                saveAll();
                render();
            }
        }

        render();
    </script>
</body>
</html>
